<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="100%" height="100%">
  <defs>
    <!-- Drop Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
    
    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 7" refX="8" refY="3.5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 7" refX="8" refY="3.5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#0d9488"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 7" refX="8" refY="3.5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="30" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#0f172a">AI-Driven Financial &amp; Content Automation Platform</text>
  <text x="30" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#0d9488">Architecture Patterns &amp; Tech Stacks of Featured Projects</text>
  <text x="30" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">Unified System Architecture &amp; Data Flow Diagram (Michael Product Lab)</text>

  <!-- Layer 1: Trigger & Client (X: 30 - 190) -->
  <rect x="25" y="90" width="165" height="515" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" rx="6"/>
  <text x="35" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#64748b" letter-spacing="0.05em">1. CLIENT &amp; TRIGGERS</text>

  <!-- User Client Node -->
  <rect x="42" y="140" width="130" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow-sm)"/>
  <circle cx="107" cy="170" r="16" fill="#f1f5f9"/>
  <path d="M 107 174 A 6 6 0 0 0 101 180 M 107 174 A 6 6 0 0 1 113 180 M 107 166 A 3.5 3.5 0 1 1 107 159" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="107" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">Users (TG/LINE)</text>
  <text x="107" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Interactive Commands</text>

  <!-- GitHub Actions (Scheduler) Node -->
  <rect x="42" y="320" width="130" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow-sm)"/>
  <circle cx="107" cy="350" r="16" fill="#f1f5f9"/>
  <circle cx="107" cy="350" r="10" fill="none" stroke="#475569" stroke-width="1.5"/>
  <path d="M 107 344 L 107 350 L 112 353" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <text x="107" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">GitHub Actions</text>
  <text x="107" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Scheduled Cron / CI</text>

  <!-- Playwright Node -->
  <rect x="42" y="470" width="130" height="90" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow-sm)"/>
  <circle cx="107" cy="500" r="16" fill="#f1f5f9"/>
  <rect x="98" y="493" width="18" height="13" rx="2" fill="none" stroke="#475569" stroke-width="1.5"/>
  <circle cx="107" cy="500" r="3" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="107" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">Playwright</text>
  <text x="107" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Automated Previews</text>

  <!-- Layer 2: Orchestration (X: 220 - 410) -->
  <rect x="215" y="90" width="195" height="515" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" rx="6"/>
  <text x="225" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#64748b" letter-spacing="0.05em">2. GATEWAY &amp; RUNNERS</text>

  <!-- Bot Gateway (Vercel) Node -->
  <rect x="232" y="140" width="160" height="110" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
  <circle cx="312" cy="175" r="16" fill="#ecfdf5"/>
  <path d="M 302 175 H 322 M 302 170 L 306 175 L 302 180 M 322 170 L 318 175 L 322 180" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="312" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">personal-bot-gateway</text>
  <text x="312" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Vercel Serverless (TS)</text>
  <text x="312" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0d9488" text-anchor="middle">FastAPI Adapter Routing</text>

  <!-- ETL & Automator (GitHub Runner) -->
  <rect x="232" y="320" width="160" height="110" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
  <circle cx="312" cy="355" r="16" fill="#f0f9ff"/>
  <circle cx="312" cy="355" r="6" fill="none" stroke="#0284c7" stroke-width="1.5"/>
  <path d="M 312 344 v 2 M 312 364 v 2 M 301 355 h 2 M 321 355 h 2" fill="none" stroke="#0284c7" stroke-width="1.5"/>
  <text x="312" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">LazyTube &amp; ETL Runner</text>
  <text x="312" y="402" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">GitHub Actions Runner</text>
  <text x="312" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0284c7" text-anchor="middle">Python CLI Pipelines</text>

  <!-- Layer 3: Services & AI (X: 440 - 710) -->
  <rect x="435" y="90" width="270" height="515" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" rx="6"/>
  <text x="445" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#64748b" letter-spacing="0.05em">3. INTEGRATED API &amp; AI AGENTS</text>

  <!-- Data Crawlers Node -->
  <rect x="455" y="140" width="230" height="110" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow-sm)"/>
  <circle cx="485" cy="175" r="16" fill="#f8fafc"/>
  <path d="M 479 175 H 491 M 485 169 V 181 M 481 171 L 489 179 M 481 179 L 489 171" stroke="#475569" stroke-width="1.5"/>
  <text x="515" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">API &amp; Scraper Layer</text>
  <text x="515" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Fugle API, FinMind API</text>
  <text x="515" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">MOPS Web Scraper</text>
  <text x="515" y="214" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">YouTube API v3</text>

  <!-- NotebookLM Handoff Node -->
  <rect x="455" y="280" width="230" height="120" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
  <circle cx="485" cy="315" r="16" fill="#fef8e8"/>
  <rect x="477" y="307" width="16" height="16" rx="2" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <path d="M 481 311 H 489 M 481 315 H 489 M 481 319 H 485" stroke="#d97706" stroke-width="1.5"/>
  <text x="515" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">NotebookLM Handoff</text>
  <text x="515" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Cookie-based Session Auth</text>
  <text x="515" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#d97706" font-weight="bold">NLM_COOKIE_BASE64 decrypt</text>
  <text x="515" y="354" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Auto Source Upload &amp; Summarize</text>
  <text x="515" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Generate Podcast/Docs</text>

  <!-- LLM & Reasoning Agents -->
  <rect x="455" y="430" width="230" height="110" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
  <circle cx="485" cy="465" r="16" fill="#faf5ff"/>
  <path d="M 485 457 L 487 462 L 492 464 L 487 466 L 485 471 L 483 466 L 478 464 L 483 462 Z" fill="#7c3aed"/>
  <text x="515" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Reasoning &amp; Agent Layer</text>
  <text x="515" y="476" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Google Gemini 1.5 Pro/Flash</text>
  <text x="515" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Groq Llama 3 (Low-latency)</text>
  <text x="515" y="504" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7c3aed" font-weight="bold">Multi-Agent Debate Adjudication</text>

  <!-- Layer 4: Data Sync & Delivery (X: 730 - 935) -->
  <rect x="730" y="90" width="205" height="515" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4" rx="6"/>
  <text x="740" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#64748b" letter-spacing="0.05em">4. STORAGE &amp; DELIVERY</text>

  <!-- Neon DB Node -->
  <rect x="750" y="140" width="165" height="110" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
  <circle cx="782" cy="175" r="16" fill="#f0fdf4"/>
  <path d="M 774 170 A 8 3 0 0 1 790 170 M 774 170 V 178 A 8 3 0 0 0 790 178 V 170 M 774 174 A 8 3 0 0 0 790 174 M 774 178 A 8 3 0 0 0 790 178 V 183 A 8 3 0 0 0 790 183 V 178" fill="none" stroke="#15803d" stroke-width="1.5"/>
  <text x="808" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Neon DB</text>
  <text x="808" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#15803d" font-weight="bold">Serverless Postgres</text>
  <text x="762" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Persistent State</text>
  <text x="762" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Schema Migrations</text>

  <!-- Upstash Redis Cache -->
  <rect x="750" y="280" width="165" height="110" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
  <circle cx="782" cy="315" r="16" fill="#fef2f2"/>
  <rect x="774" y="309" width="16" height="12" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <path d="M 774 315 H 790 M 782 309 V 321" stroke="#dc2626" stroke-width="1.5"/>
  <text x="808" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Upstash Redis</text>
  <text x="808" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#dc2626" font-weight="bold">Serverless Cache</text>
  <text x="762" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Rate Limiting &amp; TTL</text>
  <text x="762" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">API Response Cache</text>

  <!-- Outputs & Notification targets -->
  <rect x="750" y="450" width="165" height="120" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow-sm)"/>
  <circle cx="782" cy="485" r="16" fill="#f0fdfa"/>
  <path d="M 773 483 L 791 476 L 785 494 L 782 487 Z M 778 485 L 782 487" fill="none" stroke="#0f766e" stroke-width="1.5"/>
  <text x="808" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Outputs</text>
  <text x="808" y="494" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0f766e" font-weight="bold">Real-time Push</text>
  <text x="762" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Telegram Channels</text>
  <text x="762" y="534" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• LINE Message Push</text>
  <text x="762" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Vercel Web Dashboard</text>
  <text x="762" y="562" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Structured HTMLs</text>

  <!-- ================= ARROWS & CONNECTIONS ================= -->
  
  <!-- User to Gateway -->
  <path d="M 172 185 L 222 185" fill="none" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <rect x="180" y="177" width="35" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="197" y="187" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0d9488" font-weight="bold" text-anchor="middle">HTTPS</text>

  <!-- Gateway back to User -->
  <path d="M 222 205 L 172 205" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <rect x="180" y="197" width="35" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="197" y="207" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Reply</text>

  <!-- GHA Scheduler to Gateway -->
  <path d="M 107 320 V 238 L 222 210" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <rect x="120" y="250" width="60" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="150" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Dispatch GHA</text>

  <!-- GHA Scheduler to ETL Runner -->
  <path d="M 172 365 L 222 365" fill="none" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="180" y="357" width="35" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="197" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0284c7" font-weight="bold" text-anchor="middle">Trigger</text>

  <!-- Playwright to Vercel Gateway (Screenshot target) -->
  <path d="M 172 515 H 200 V 235 H 222" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow-dash)"/>
  <rect x="175" y="475" width="45" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="197" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#475569" text-anchor="middle">Capture UI</text>

  <!-- Gateway to Database -->
  <path d="M 392 150 H 740" fill="none" stroke="#15803d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="520" y="142" width="80" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="560" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#15803d" font-weight="bold" text-anchor="middle">Prisma SQL Query</text>

  <!-- Gateway to Cache -->
  <path d="M 392 210 H 420 V 270 H 740 V 285" fill="none" stroke="#b91c1c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="490" y="262" width="70" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="525" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#b91c1c" text-anchor="middle">Cache Check / TTL</text>

  <!-- Gateway to Scraper Layer -->
  <path d="M 392 180 L 445 180" fill="none" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ETL Runner to Scraper Layer -->
  <path d="M 392 340 L 420 340 V 210 L 445 210" fill="none" stroke="#475569" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="382" y="290" width="55" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="410" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#475569" text-anchor="middle">Fetch Data</text>

  <!-- Scraper to NotebookLM -->
  <path d="M 570 250 V 270" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="535" y="253" width="70" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="570" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#d97706" text-anchor="middle">Upload Source</text>

  <!-- NotebookLM to Gemini/Groq -->
  <path d="M 570 400 V 420" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="535" y="403" width="70" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="570" y="413" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#7c3aed" text-anchor="middle">Refine Summary</text>

  <!-- Gemini/Groq output to Outputs -->
  <path d="M 685 485 L 740 485" fill="none" stroke="#0f766e" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <rect x="687" y="477" width="50" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="712" y="487" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#0f766e" font-weight="bold" text-anchor="middle">Push Result</text>

  <!-- ETL Runner to DB -->
  <path d="M 392 380 H 430 V 580 H 720 V 215 H 740" fill="none" stroke="#15803d" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <rect x="510" y="572" width="100" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="560" y="582" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#15803d" text-anchor="middle">Sync CLI State to DB</text>

  <!-- Outputs to Vercel UI (Static Overrides / Preview pipeline display) -->
  <path d="M 832 450 V 260 C 832 250 832 250 832 250 H 392" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <rect x="620" y="243" width="70" height="14" fill="#ffffff" opacity="0.9" rx="2"/>
  <text x="655" y="253" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#475569" text-anchor="middle">SSG Build JSON</text>

</svg>